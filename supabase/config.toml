# PostingHub Supabase local config
# 참고: https://supabase.com/docs/guides/local-development/cli/config

project_id = "postinghub"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = [
  "http://localhost:5173/auth-callback",
  "http://127.0.0.1:5173/auth-callback",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false # 로컬은 confirm 생략

# Magic link 권장 — 운영자 도구라 비번 없는 이메일 로그인이 깔끔
[auth.email.template.magic_link]
subject = "PostingHub 로그인 링크"
content_path = "./templates/magic_link.html"

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

[functions.hook-intake]
verify_jwt = false # Claude / external 호출이라 자체 Bearer 검증 사용

[inbucket]
enabled = true
port = 54324

[storage]
enabled = false
